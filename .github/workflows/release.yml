name: Release Build

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            runner: macos-latest
            bundles: dmg
          - name: Windows
            runner: windows-latest
            bundles: msi,nsis
          - name: Linux
            runner: ubuntu-22.04
            bundles: deb,appimage

    name: Desktop — ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libdbus-1-dev \
            libssl-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install frontend dependencies
        run: bun install

      - name: Patch release version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Strip v prefix and any pre-release suffix (e.g. v1.0.0-hotfix3 -> 1.0.0)
          VERSION="$(echo "$TAG" | sed 's/^v//' | sed 's/-.*//')"
          echo "Release version: $VERSION (from tag: $TAG)"

          if [[ "$RUNNER_OS" == "macOS" ]]; then
            sed -i '' "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json
          else
            sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json
          fi

          grep '"version"' src-tauri/tauri.conf.json

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS signing is currently ad-hoc (signingIdentity "-" in tauri.conf.json).
          # To enable Developer ID signing + notarization, enroll in the Apple
          # Developer Program, set the secrets below in repo settings, then
          # uncomment these lines:
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tauriScript: bun run tauri
          args: --bundles ${{ matrix.bundles }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.name }}
          path: |
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.app
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.AppImage
          if-no-files-found: error

  release:
    name: Create Release
    needs: build-desktop
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | head -50

      - name: Build release notes
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT_TAG="${GITHUB_REF_NAME}"
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${CURRENT_TAG}$" | head -1 || true)

          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..${CURRENT_TAG}"
            HEADER="### Changes since \`${PREV_TAG}\`"
          else
            RANGE="${CURRENT_TAG}"
            HEADER="### Initial commits"
          fi

          {
            echo "## ExaTon Next ${CURRENT_TAG}"
            echo ""
            echo "${HEADER}"
            echo ""
            git log "$RANGE" --no-merges --format="%H%x09%h%x09%s" | while IFS=$'\t' read -r full short subject; do
              login=$(gh api "repos/${GITHUB_REPOSITORY}/commits/${full}" --jq '.author.login // ""' 2>/dev/null || true)
              if [ -n "$login" ]; then
                printf -- "- \`%s\` %s — @%s\n" "$short" "$subject" "$login"
              else
                printf -- "- \`%s\` %s\n" "$short" "$subject"
              fi
            done
            echo ""
            echo "---"
            echo ""
            echo "### macOS install"
            echo ""
            echo "If the app shows \"damaged\" or \"cannot verify developer\" on first launch:"
            echo ""
            echo "1. Open **Terminal** (⌘Space → \"Terminal\")."
            echo "2. Type the following with a **trailing space** (don't press Enter yet):"
            echo ""
            echo '   ```bash'
            echo '   xattr -cr '
            echo '   ```'
            echo ""
            echo "3. Drag the **ExaTon Next** app from Finder *into* the Terminal window — the full path auto-completes."
            echo "4. Press **Enter**. Then launch the app normally."
          } > release-notes.md

          echo "--- release-notes.md ---"
          cat release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ExaTon Next ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          files: artifacts/**/*
          body_path: release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

